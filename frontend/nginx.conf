server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # --- Security headers ---
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "DENY"           always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # --- index.html: never cache so users always get the latest bundle entry point ---
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        # Re-apply security headers (add_header is not inherited when a
        # location block defines its own add_header directives)
        add_header X-Content-Type-Options  "nosniff"        always;
        add_header X-Frame-Options         "DENY"           always;
        add_header X-XSS-Protection        "1; mode=block"  always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    }

    # --- Hashed static assets: cache aggressively for 1 year ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- React Router: serve index.html for all unknown paths ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Graceful error pages ---
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
